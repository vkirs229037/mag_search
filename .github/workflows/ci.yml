name: CI/CD search-service

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: python:3.14-slim
    steps:
      - uses: actions/checkout@v4

      - name: Checkout deploy-config (for test config)
        uses: actions/checkout@v4
        with:
          repository: vkirs229037/mag_deploy
          token: ${{ secrets.DEPLOY_CONFIG_PAT }}
          path: ./deploy-config

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      # - name: Run tests with test config
      #   env:
      #     DATABASE_URL: sqlite:///:memory:
      #     SECRET_KEY: testsecret
      #   run: |
      #     . .venv/bin/activate
      #     mkdir -p config
      #     cp ./deploy-config/environments/search-service/config.test.yaml ./config/config.yaml
      #     python -m pytest tests/

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: search-source
          path: |
            app.py
            requirements.txt
            Dockerfile

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: search-source
          path: ./build-context

      - name: Checkout deploy-config for production config (опционально)
        uses: actions/checkout@v4
        with:
          repository: vkirs229037/mag_deploy
          token: ${{ secrets.DEPLOY_CONFIG_PAT }}
          path: ./deploy-config
        # Здесь мы не копируем конфиг в образ, потому что для prod он монтируется.
        # Но можно скопировать, если образ должен быть самодостаточным.

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./build-context
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
